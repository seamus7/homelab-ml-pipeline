apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-pvc
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:latest
          ports:
            - containerPort: 3000
            - containerPort: 22
          env:
            - name: GITEA__server__ROOT_URL
              value: "http://gitea.homelab.local"
            - name: GITEA__server__LOCAL_ROOT_URL
              value: "http://10.73.1.145"
            - name: GITEA__server__SSH_DOMAIN
              value: "gitea.homelab.local"
            - name: GITEA__server__SSH_PORT
              value: "2222"
            - name: GITEA__database__DB_TYPE
              value: "postgres"
            - name: GITEA__database__HOST
              value: "db:5432"
            - name: GITEA__database__NAME
              value: "gitea"
            - name: GITEA__database__USER
              value: "admin"
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: gitea-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: gitea
spec:
  type: ClusterIP
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
# SSH cannot go through HTTP ingress. LoadBalancer type is handled by
# k3s's built-in svclb. Port 2222 preserved for YubiKey push.
apiVersion: v1
kind: Service
metadata:
  name: gitea-ssh
spec:
  type: LoadBalancer
  selector:
    app: gitea
  ports:
    - name: ssh
      port: 2222
      targetPort: 22

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitea
spec:
  ingressClassName: traefik
  rules:
    - host: gitea.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitea
                port:
                  number: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: gitea-http-nodeport
spec:
  type: NodePort
  selector:
    app: gitea
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
