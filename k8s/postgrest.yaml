apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
    spec:
      containers:
        - name: postgrest
          image: postgrest/postgrest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PGRST_DB_URI
              valueFrom:
                secretKeyRef:
                  name: postgrest-secret
                  key: db-uri
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postgrest-secret
                  key: jwt-secret
            - name: PGRST_DB_SCHEMA
              value: "public"
            - name: PGRST_DB_ANON_ROLE
              value: "anon"
            - name: PGRST_SERVER_HOST
              value: "0.0.0.0"
            - name: PGRST_LOG_LEVEL
              value: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: postgrest
spec:
  selector:
    app: postgrest
  ports:
    - port: 3000
      targetPort: 3000
