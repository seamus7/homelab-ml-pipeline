---
apiVersion: v1
kind: ConfigMap
metadata:
  name: modernizer-config
  namespace: default
data:
  OLLAMA_URL: "http://ollama:11434"
  QDRANT_URL: "http://qdrant:6333"
  COLLECTION: "fortran_subroutines"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modernizer
  namespace: default
  labels:
    app: modernizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modernizer
  template:
    metadata:
      labels:
        app: modernizer
    spec:
      containers:
        - name: modernizer
          image: modernizer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: modernizer-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: modernizer
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: modernizer
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modernizer
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: modernizer.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: modernizer
                port:
                  number: 8000
