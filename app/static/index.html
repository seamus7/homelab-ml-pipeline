<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortran Modernizer — Codebase Search</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface2:     #1c2128;
      --border:       #30363d;
      --border-hi:    #58a6ff;
      --text:         #c9d1d9;
      --text-muted:   #8b949e;
      --accent:       #58a6ff;
      --accent-dim:   #1f3a5a;
      --green:        #3fb950;
      --yellow:       #d29922;
      --red:          #f85149;
      --code-bg:      #0d1117;
      --mono:         'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace;
      --sans:         'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px 48px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      padding: 40px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .header-title {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .header-sub {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Search bar ──────────────────────────────────────────────────────── */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    #query {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    #query:focus { border-color: var(--border-hi); }
    #query::placeholder { color: var(--text-muted); }

    #search-btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 10px 20px;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    #search-btn:hover:not(:disabled) {
      background: var(--accent);
      color: var(--bg);
    }

    #search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Status line ─────────────────────────────────────────────────────── */
    #status {
      font-family: var(--mono);
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 16px;
    }

    #status.loading { color: var(--text-muted); }
    #status.error   { color: var(--red); }
    #status.info    { color: var(--text-muted); }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result cards ────────────────────────────────────────────────────── */
    #results { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    /* card header */
    .card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .card-title-group { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }

    .card-name {
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .card-type {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
    }

    .card-loc {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-score {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    /* card body sections */
    .card-section { padding: 12px 16px; }
    .card-section + .card-section { border-top: 1px solid var(--border); }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .card-summary {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
    }

    /* calls badges */
    .calls-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }

    .call-badge {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 7px;
      color: var(--text-muted);
    }

    .no-calls {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* code block */
    .code-wrap { position: relative; }

    pre.code-block {
      background: var(--code-bg);
      border-radius: 4px;
      color: #e6edf3;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      margin: 0;
      overflow-x: auto;
      padding: 10px 12px;
      white-space: pre;
    }

    .show-more-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      margin-top: 6px;
      padding: 4px 10px;
      transition: color 0.1s, border-color 0.1s;
    }

    .show-more-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="header-title">⬡ Fortran Modernizer</div>
      <div class="header-sub">Semantic search over parsed &amp; summarized Fortran subroutines</div>
    </header>

    <div class="search-row">
      <input id="query" type="text" placeholder="e.g. coordinate transformation between reference frames" autocomplete="off" spellcheck="false">
      <button id="search-btn">Search</button>
    </div>

    <div id="status"></div>
    <div id="results"></div>
  </div>

  <script>
    "use strict";

    const CODE_PREVIEW_LINES = 15;

    // ── DOM helpers ──────────────────────────────────────────────────────────

    function el(tag, props, ...children) {
      const e = document.createElement(tag);
      if (props) {
        for (const [k, v] of Object.entries(props)) {
          if (k === "class")        e.className = v;
          else if (k === "text")    e.textContent = v;
          else if (k === "style")   Object.assign(e.style, v);
          else if (k.startsWith("on")) e.addEventListener(k.slice(2), v);
          else                      e.setAttribute(k, v);
        }
      }
      for (const c of children) {
        if (c == null) continue;
        e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
      }
      return e;
    }

    function scoreColor(s) {
      // cosine similarity: ≥0.75 green, ≥0.60 yellow, below red
      if (s >= 0.75) return "var(--green)";
      if (s >= 0.60) return "var(--yellow)";
      return "var(--red)";
    }

    // ── Card builder ─────────────────────────────────────────────────────────

    function buildCard(r) {
      const codeLines = (r.raw_code || "").split("\n");
      const preview   = codeLines.slice(0, CODE_PREVIEW_LINES);
      const overflow  = codeLines.slice(CODE_PREVIEW_LINES);

      // Header
      const header = el("div", { class: "card-header" },
        el("div", { class: "card-title-group" },
          el("span", { class: "card-name",  text: r.name }),
          el("span", { class: "card-type",  text: r.type }),
          el("span", { class: "card-loc",
            text: `${r.source_file}  ·  lines ${r.line_start}–${r.line_end}` }),
        ),
        el("span", { class: "card-score",
          style: { color: scoreColor(r.score) },
          text: r.score.toFixed(3) }),
      );

      // Summary section
      const summarySection = el("div", { class: "card-section" },
        el("div", { class: "section-label", text: "Summary" }),
        el("p",   { class: "card-summary",  text: r.summary || "(no summary)" }),
      );

      // Calls section
      const callsList = el("div", { class: "calls-list" });
      if (r.calls && r.calls.length > 0) {
        for (const c of r.calls) {
          callsList.appendChild(el("span", { class: "call-badge", text: c }));
        }
      } else {
        callsList.appendChild(el("span", { class: "no-calls", text: "no calls to other routines" }));
      }
      const callsSection = el("div", { class: "card-section" },
        el("div", { class: "section-label", text: "Calls" }),
        callsList,
      );

      // Code section
      const preEl = el("pre", { class: "code-block", text: preview.join("\n") });

      const codeWrap = el("div", { class: "code-wrap" }, preEl);

      if (overflow.length > 0) {
        let expanded = false;
        const btn = el("button", {
          class: "show-more-btn",
          text: `▼  ${overflow.length} more line${overflow.length === 1 ? "" : "s"}`,
          onclick: () => {
            expanded = !expanded;
            if (expanded) {
              preEl.textContent = codeLines.join("\n");
              btn.textContent = "▲  show less";
            } else {
              preEl.textContent = preview.join("\n");
              btn.textContent = `▼  ${overflow.length} more line${overflow.length === 1 ? "" : "s"}`;
            }
          },
        });
        codeWrap.appendChild(btn);
      }

      const codeSection = el("div", { class: "card-section" },
        el("div", { class: "section-label", text: "Source" }),
        codeWrap,
      );

      return el("div", { class: "card" }, header, summarySection, callsSection, codeSection);
    }

    // ── Status helpers ───────────────────────────────────────────────────────

    const statusEl  = document.getElementById("status");
    const resultsEl = document.getElementById("results");

    function setStatus(type, content) {
      statusEl.className = type;
      statusEl.innerHTML = "";
      if (content) statusEl.appendChild(content);
    }

    function clearStatus() { statusEl.className = ""; statusEl.innerHTML = ""; }

    // ── Search ───────────────────────────────────────────────────────────────

    async function runSearch() {
      const query = document.getElementById("query").value.trim();
      if (!query) return;

      const btn = document.getElementById("search-btn");
      btn.disabled = true;
      resultsEl.innerHTML = "";

      const spinner = el("span", { class: "spinner" });
      setStatus("loading", el("span", null, spinner, `Searching for "${query}"…`));

      let data;
      try {
        const resp = await fetch("/search", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ query, top: 5 }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: resp.statusText }));
          throw new Error(err.detail || resp.statusText);
        }
        data = await resp.json();
      } catch (e) {
        setStatus("error", document.createTextNode(`Error: ${e.message}`));
        btn.disabled = false;
        return;
      }

      btn.disabled = false;

      const n = data.results.length;
      if (n === 0) {
        setStatus("info", document.createTextNode("No results found."));
        return;
      }

      setStatus("info", document.createTextNode(
        `${n} result${n === 1 ? "" : "s"} for "${data.query}"`
      ));

      for (const r of data.results) {
        resultsEl.appendChild(buildCard(r));
      }
    }

    // ── Wiring ───────────────────────────────────────────────────────────────

    document.getElementById("search-btn").addEventListener("click", runSearch);
    document.getElementById("query").addEventListener("keydown", e => {
      if (e.key === "Enter") runSearch();
    });

    // Focus the input on load
    document.getElementById("query").focus();
  </script>
</body>
</html>
