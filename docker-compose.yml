networks:
  homelab:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    container_name: homelab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks: [homelab]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  gitea:
    image: gitea/gitea:latest
    container_name: homelab-git
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports: ["3000:3000", "2222:22"]
    volumes: ["./gitea_data:/data"]
    networks: [homelab]
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=admin
      - GITEA__database__PASSWD=${POSTGRES_PASSWORD}

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: homelab-mlflow
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports: ["5000:5000"]
    volumes:
      - ./mlflow_artifacts:/mlflow_artifacts
    networks: [homelab]
    command: >
      mlflow server
      --backend-store-uri postgresql://admin:${POSTGRES_PASSWORD}@db:5432/mlflow
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /mlflow_artifacts
      --serve-artifacts
      --host 0.0.0.0

  ollama:
    image: ollama/ollama:latest
    container_name: homelab-ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes: ["./ollama_data:/root/.ollama"]
    ports: ["11435:11434"]
    networks: [homelab]
